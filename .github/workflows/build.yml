name: Build & Push to ACR

on:
  workflow_run:
    workflows: ["Terraform AKS Deploy"]   # 👈 FIX
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: e1438469-06c5-448d-88c2-29ab744032c2
          tenant-id: 3d084a01-eb62-47fe-bb1e-748c68591432
          subscription-id: cfc0d37c-0341-4d06-bcf3-35b93770a2ee

      - name: ACR Login
        run: az acr login --name akscon1

      - name: Build Docker Image
        run: docker build -t akscon1.azurecr.io/myapp:v1 environment/dev/MicroTodoUI

      - name: Push Image to ACR
        run: docker push akscon1.azurecr.io/todo-ui:v1
