apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-delete-task-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-delete-task-api
  template:
    metadata:
      labels:
        app: todo-delete-task-api
    spec:
      containers:
      - name: todo-delete-task-api
        image: akscon1.azurecr.io/todo-delete-task-api:v1
        ports:
        - containerPort: 8000
        env: 
        - name: CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: CONNECTION_STRING
              
